# Railway: Root Directory olarak `backend` seçin veya bu dosyayı deploy köküne koyun.
# https://docs.railway.app/guides/prisma

[build]
builder = "NIXPACKS"

[deploy]
# Şema senkronu + API başlatma (ilk kurulumdan sonra seed: Railway shell → npx tsx prisma/seed.ts)
# DATABASE_URL: Backend servisinde Postgres’ten Reference ile ekleyin (zorunlu).
startCommand = "node scripts/prisma-db-push.cjs && node dist/index.js"
